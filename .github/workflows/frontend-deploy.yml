name: Frontend Deploy

on:
  push:
    branches:
      - staging
      - staging

permissions:
  id-token: write
  contents: read

jobs:

  # =========================
  #  STAGING
  # =========================
  build-staging:
    if: github.ref_name == 'staging'
    runs-on: codebuild-petpooja-ai-agent-prod-${{ github.run_id }}-${{ github.run_attempt }}
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Enable pnpm
        run: corepack enable

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.IAM_OIDC_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_DEFAULT_REGION }}

      - name: Set environment variables
        run: |
          echo "S3_ENV_PATH=${{ secrets.S3_ENV_PATH_STG }}" >> $GITHUB_ENV
          echo "S3_BUCKET=${{ secrets.S3_FRONTEND_BUCKET_STG }}" >> $GITHUB_ENV

      - name: Download env
        run: |
          aws s3 cp "$S3_ENV_PATH/env" .env

      - name: Install deps
        run: pnpm install

      - name: Build
        run: pnpm build

      - name: Deploy to S3 with correct Content-Types
        run: |
          BUILD_DIR="dist"

          echo "Deploying CSS..."
          aws s3 sync "$BUILD_DIR/" "$S3_BUCKET/" \
            --exclude "*" --include "*.css" \
            --content-type "text/css" \
            --cache-control "public, max-age=31536000, immutable"

          echo "Deploying JS..."
          aws s3 sync "$BUILD_DIR/" "$S3_BUCKET/" \
            --exclude "*" --include "*.js" \
            --content-type "application/javascript" \
            --cache-control "public, max-age=31536000, immutable"

          echo "Deploying JSON..."
          aws s3 sync "$BUILD_DIR/" "$S3_BUCKET/" \
            --exclude "*" --include "*.json" \
            --content-type "application/json" \
            --cache-control "public, max-age=31536000, immutable"

          echo "Deploying HTML..."
          aws s3 sync "$BUILD_DIR/" "$S3_BUCKET/" \
            --exclude "*" --include "*.html" \
            --content-type "text/html; charset=utf-8" \
            --cache-control "public, max-age=0, must-revalidate"

          echo "Deploying images..."
          aws s3 sync "$BUILD_DIR/" "$S3_BUCKET/" \
            --exclude "*" \
            --include "*.png" --include "*.jpg" --include "*.jpeg" \
            --include "*.gif" --include "*.svg" --include "*.webp" --include "*.ico" \
            --cache-control "public, max-age=31536000, immutable"

          echo "Deploying fonts..."
          aws s3 sync "$BUILD_DIR/" "$S3_BUCKET/" \
            --exclude "*" \
            --include "*.woff" --include "*.woff2" --include "*.ttf" --include "*.eot" \
            --cache-control "public, max-age=31536000, immutable"

          echo "Deploying remaining files..."
          aws s3 sync "$BUILD_DIR/" "$S3_BUCKET/" \
            --exclude "*.css" --exclude "*.js" --exclude "*.json" --exclude "*.html" \
            --exclude "*.png" --exclude "*.jpg" --exclude "*.jpeg" --exclude "*.gif" \
            --exclude "*.svg" --exclude "*.webp" --exclude "*.ico" \
            --exclude "*.woff" --exclude "*.woff2" --exclude "*.ttf" --exclude "*.eot"

      - name: Done
        run: echo "Staging deployed"

  # =========================
  #  PRODUCTION
  # =========================
  build-production:
    if: github.ref_name == 'staging'
    runs-on: codebuild-petpooja-ai-agent-prod-${{ github.run_id }}-${{ github.run_attempt }}
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Enable pnpm
        run: corepack enable

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.IAM_OIDC_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_DEFAULT_REGION }}

      - name: Set environment variables
        run: |
          echo "S3_ENV_PATH=${{ secrets.S3_ENV_PATH_PRD }}" >> $GITHUB_ENV
          echo "S3_BUCKET=${{ secrets.S3_FRONTEND_BUCKET_PRD }}" >> $GITHUB_ENV

      - name: Download env
        run: |
          aws s3 cp "$S3_ENV_PATH/env" .env

      - name: Install deps
        run: pnpm install

      - name: Build
        run: pnpm build

      - name: Deploy to S3 with correct Content-Types
        run: |
          BUILD_DIR="dist"

          echo "Deploying CSS..."
          aws s3 sync "$BUILD_DIR/" "$S3_BUCKET/" \
            --exclude "*" --include "*.css" \
            --content-type "text/css" \
            --cache-control "public, max-age=31536000, immutable"

          echo "Deploying JS..."
          aws s3 sync "$BUILD_DIR/" "$S3_BUCKET/" \
            --exclude "*" --include "*.js" \
            --content-type "application/javascript" \
            --cache-control "public, max-age=31536000, immutable"

          echo "Deploying JSON..."
          aws s3 sync "$BUILD_DIR/" "$S3_BUCKET/" \
            --exclude "*" --include "*.json" \
            --content-type "application/json" \
            --cache-control "public, max-age=31536000, immutable"

          echo "Deploying HTML..."
          aws s3 sync "$BUILD_DIR/" "$S3_BUCKET/" \
            --exclude "*" --include "*.html" \
            --content-type "text/html; charset=utf-8" \
            --cache-control "public, max-age=0, must-revalidate"

          echo "Deploying images..."
          aws s3 sync "$BUILD_DIR/" "$S3_BUCKET/" \
            --exclude "*" \
            --include "*.png" --include "*.jpg" --include "*.jpeg" \
            --include "*.gif" --include "*.svg" --include "*.webp" --include "*.ico" \
            --cache-control "public, max-age=31536000, immutable"

          echo "Deploying fonts..."
          aws s3 sync "$BUILD_DIR/" "$S3_BUCKET/" \
            --exclude "*" \
            --include "*.woff" --include "*.woff2" --include "*.ttf" --include "*.eot" \
            --cache-control "public, max-age=31536000, immutable"

          echo "Deploying remaining files..."
          aws s3 sync "$BUILD_DIR/" "$S3_BUCKET/" \
            --exclude "*.css" --exclude "*.js" --exclude "*.json" --exclude "*.html" \
            --exclude "*.png" --exclude "*.jpg" --exclude "*.jpeg" --exclude "*.gif" \
            --exclude "*.svg" --exclude "*.webp" --exclude "*.ico" \
            --exclude "*.woff" --exclude "*.woff2" --exclude "*.ttf" --exclude "*.eot"

      - name: Done
        run: echo "Production deployed"
